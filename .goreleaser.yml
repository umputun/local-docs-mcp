project_name: local-docs-mcp
dist: .bin
builds:
  - id: local-docs-mcp
    binary: "local-docs-mcp"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm
      - arm64
    ignore:
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
    dir: app
    ldflags: "-s -w -X main.revision={{.Tag}}-{{.ShortCommit}}-{{.CommitDate}}"

archives:
  - id: local-docs-mcp
    name_template: >-
     {{.ProjectName}}_
     {{- .Tag}}_
     {{- if eq .Os "darwin"}}macos
     {{- else if eq .Os "windows"}}win
     {{- else}}{{.Os}}{{end}}_
     {{- if eq .Arch "amd64"}}x86_64
     {{- else if eq .Arch "386"}}i386
     {{- else}}{{.Arch}}{{end}}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - completions/*
    rlcp: true

brews:
  -
    name: local-docs-mcp
    tap:
      owner: umputun
      name: homebrew-apps
      branch: master
    directory: Formula
    commit_author:
      name: umputun
      email: umputun@gmail.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/umputun/local-docs-mcp"
    description: "MCP server for local documentation access"
    license: "MIT"
    extra_install: |
      bash_completion.install "completions/local-docs-mcp.bash" => "local-docs-mcp"
      zsh_completion.install "completions/local-docs-mcp.zsh" => "_local-docs-mcp"
      fish_completion.install "completions/local-docs-mcp.fish" => "local-docs-mcp.fish"


nfpms:
  - id: local-docs-mcp
    package_name: local-docs-mcp
    file_name_template: "{{.ProjectName}}_{{.Tag}}_{{.Os}}_{{.Arch}}"
    vendor: Umputun
    homepage: https://github.com/umputun/local-docs-mcp
    maintainer: Umputun <umputun@gmail.com>
    description: MCP server for local documentation access
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    epoch: 1
    release: 1
    contents:
      - src: completions/local-docs-mcp.bash
        dst: /usr/share/bash-completion/completions/local-docs-mcp
      - src: completions/local-docs-mcp.zsh
        dst: /usr/share/zsh/vendor-completions/_local-docs-mcp
      - src: completions/local-docs-mcp.fish
        dst: /usr/share/fish/vendor_completions.d/local-docs-mcp.fish
